name: 'Deploy Construct'

on:
  workflow_call:
    inputs:
      construct:
        description: 'Construct name (e.g. storage-account, private-endpoint)'
        required: true
        type: string
      constructVersion:
        description: 'Construct version tag (e.g. 0.2.0)'
        required: true
        type: string
      parametersFile:
        description: 'Path to parameters file relative to caller repo root'
        required: true
        type: string
      env:
        description: 'GitHub environment name'
        required: true
        type: string
      azureRegion:
        description: 'Azure region'
        required: true
        type: string
      resourceGroup:
        description: 'Resource group name'
        required: true
        type: string
      deploymentStackName:
        description: 'Deployment Stack name (if empty, uses arm-deploy)'
        required: false
        type: string
        default: ''
      actionOnUnmanage:
        description: 'Action on unmanage for deployment stack'
        required: false
        type: string
        default: 'detachAll'
      whatIf:
        description: 'Run as what-if instead of deploying'
        required: false
        type: boolean
        default: false
    secrets:
      SUBSCRIPTION_ID:
        required: true
      CLIENT_ID:
        required: true
      TENANT_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 'Deploy ${{ inputs.construct }} v${{ inputs.constructVersion }}'
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          path: CallerRepo

      # azure-iac is public — no token needed
      - name: Checkout azure-iac at construct tag
        uses: actions/checkout@v4
        with:
          ref: constructs/${{ inputs.construct }}/${{ inputs.constructVersion }}
          repository: gullapalli-r/azure-iac
          path: ConstructsRepo

      - name: Set deployment timestamp
        run: echo "NOW=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: What-If
        if: ${{ inputs.whatIf == true }}
        uses: Azure/arm-deploy@v2
        with:
          scope: resourcegroup
          deploymentName: 'GHA-${{ inputs.construct }}-${{ github.run_number }}-${{ env.NOW }}'
          subscriptionId: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ inputs.resourceGroup }}
          region: ${{ inputs.azureRegion }}
          template: ConstructsRepo/modules/constructs/${{ inputs.construct }}/main.bicep
          parameters: CallerRepo/${{ inputs.parametersFile }}
          additionalArguments: '--what-if'
          failOnStdErr: false

      - name: Deploy with Deployment Stack
        if: ${{ inputs.whatIf == false && inputs.deploymentStackName != '' }}
        run: |
          az stack group create \
            --name '${{ inputs.deploymentStackName }}-${{ inputs.construct }}' \
            --resource-group '${{ inputs.resourceGroup }}' \
            --template-file 'ConstructsRepo/modules/constructs/${{ inputs.construct }}/main.bicep' \
            --parameters 'CallerRepo/${{ inputs.parametersFile }}' \
            --description 'Construct: ${{ inputs.construct }} v${{ inputs.constructVersion }} | Run by: ${{ github.actor }}' \
            --action-on-unmanage '${{ inputs.actionOnUnmanage }}' \
            --deny-settings-mode None

      - name: Deploy with ARM Deploy
        if: ${{ inputs.whatIf == false && inputs.deploymentStackName == '' }}
        uses: Azure/arm-deploy@v2
        with:
          scope: resourcegroup
          deploymentName: 'GHA-${{ inputs.construct }}-${{ github.run_number }}-${{ env.NOW }}'
          subscriptionId: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ inputs.resourceGroup }}
          region: ${{ inputs.azureRegion }}
          template: ConstructsRepo/modules/constructs/${{ inputs.construct }}/main.bicep
          parameters: CallerRepo/${{ inputs.parametersFile }}
          failOnStdErr: false