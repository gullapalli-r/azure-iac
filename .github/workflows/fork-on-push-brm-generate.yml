name: On push run brm generate

on:
  push:
    branches-ignore:
      - main
    paths:
      - modules/**/*.bicep
      - modules/**/version.json
      - modules/**/README.md
permissions:
  contents: write
jobs:
  get-module-to-validate:
    uses: ./.github/workflows/get-changed-module.yml

  push-brm-generate:
    runs-on: ubuntu-latest
    needs: get-module-to-validate
    if: needs.get-module-to-validate.outputs.module_dir != ''
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install BRM tool
        run: dotnet tool install --global Azure.Bicep.RegistryModuleTool --version "${{ vars.BRM_VERSION || '0.38.33' }}"

      - name: Run brm generate
        run: brm generate
        working-directory: ${{ needs.get-module-to-validate.outputs.module_dir }}

      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: autogenerate bicep files"
          add: "modules"
