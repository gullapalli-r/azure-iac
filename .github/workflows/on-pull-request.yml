name: On pull request

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  get-module-to-validate:
    uses: ./.github/workflows/get-changed-module.yml

  validate-module-files:
    runs-on: ubuntu-latest
    needs: get-module-to-validate
    environment: rg-iac-eastus
    if: needs.get-module-to-validate.outputs.module_dir != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install BRM tool
        run: dotnet tool install --global Azure.Bicep.RegistryModuleTool --version "${{ vars.BRM_VERSION || '0.38.33' }}"
      - name: Install Bicep CLI
        uses: ./.github/actions/setup-bicep
        with:
          version: ${{ vars.BICEP_VERSION }}
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate module files
        run: brm validate --verbose
        working-directory: ${{ needs.get-module-to-validate.outputs.module_dir }}

      - name: Check generated files are up-to-date
        run: |
          brm generate
          git diff --exit-code
        working-directory: ${{ needs.get-module-to-validate.outputs.module_dir }}

  enforce-version-bump:
    runs-on: ubuntu-latest
    needs: get-module-to-validate
    if: needs.get-module-to-validate.outputs.module_dir != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install semver
        run: npm install semver

      - name: Validate module version bump
        env:
          MODULE_DIR: ${{ needs.get-module-to-validate.outputs.module_dir }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BASE_VERSION=$(git show "${BASE_SHA}:${MODULE_DIR}/version.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
          HEAD_VERSION=$(git show "${HEAD_SHA}:${MODULE_DIR}/version.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)

          BASE_VERSION=$(echo "$BASE_VERSION" | tr -d '[:space:]')
          HEAD_VERSION=$(echo "$HEAD_VERSION" | tr -d '[:space:]')

          [ -z "$BASE_VERSION" ] && BASE_VERSION="0.0.0"
          [ -z "$HEAD_VERSION" ] && { echo "Missing version in ${MODULE_DIR}/version.json at HEAD"; exit 1; }

          [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+$ ]] && BASE_VERSION="${BASE_VERSION}.0"
          [[ "$HEAD_VERSION" =~ ^[0-9]+\.[0-9]+$ ]] && HEAD_VERSION="${HEAD_VERSION}.0"

          node -e "const semver=require('semver'); const b=process.argv[1], h=process.argv[2]; if(!semver.valid(b)) { console.error('Invalid base version:', b); process.exit(1);} if(!semver.valid(h)) { console.error('Invalid head version:', h); process.exit(1);} if(!semver.gt(h,b)) { console.error('Head version must be greater than base version:', b, '->', h); process.exit(1);} console.log('Version bump valid:', b, '->', h);" "$BASE_VERSION" "$HEAD_VERSION"

  validate-non-module-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install packages
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run prettier:check
