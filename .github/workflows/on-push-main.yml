name: On push main

on:
  push:
    branches:
      - main

permissions:
  contents: write # required to push tags
  id-token: write

jobs:
  get-changed-module:
    uses: ./.github/workflows/get-changed-module.yml

  create-tag:
    runs-on: ubuntu-latest
    needs: get-changed-module
    if: ${{ needs.get-changed-module.outputs.module_dir != '' }}
    outputs:
      tag: ${{ steps.create-tag.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to read version.json at base commit

      - name: Get base version
        id: base-version
        run: |
          VERSION=$(git show "${{ github.event.before }}:${{ needs.get-changed-module.outputs.module_dir }}/version.json" 2>/dev/null \
            | jq -r '.version // empty' 2>/dev/null || true)

          VERSION=$(echo "$VERSION" | tr -d '[:space:]')
          [ -z "$VERSION" ] && VERSION="0.0.0"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]] && VERSION="${VERSION}.0"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Get head version
        id: head-version
        run: |
          VERSION=$(jq -r '.version // empty' "${{ needs.get-changed-module.outputs.module_dir }}/version.json" 2>/dev/null || true)
          VERSION=$(echo "$VERSION" | tr -d '[:space:]')
          [ -z "$VERSION" ] && { echo "Head version missing"; exit 1; }
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]] && VERSION="${VERSION}.0"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install semver
        run: npm install semver

      - name: Create tag
        id: create-tag
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const script = require("./scripts/github-actions/create-tag.js")
            return await script({
              require,
              github,
              context,
              core,
              moduleDir: "${{ needs.get-changed-module.outputs.module_dir }}",
              baseVersion: "${{ steps.base-version.outputs.version }}",
              headVersion: "${{ steps.head-version.outputs.version }}",
            })

  publish-module:
    needs: create-tag
    if: ${{ needs.create-tag.outputs.tag != '' }}
    uses: ./.github/workflows/publish-module.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
