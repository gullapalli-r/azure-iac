name: Publish module

on:
  workflow_call:
    inputs:
      tag:
        description: "The git tag of the module to publish."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "The git tag of the module to publish. Format: constructs/<module-name>/<version>"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: rg-iac-eastus
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse-tag
        uses: actions/github-script@v7
        with:
          script: |
            const script = require("./scripts/github-actions/parse-tag.js")
            const tag = "${{ github.event.inputs.tag || inputs.tag }}"
            script({ core, tag })

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || inputs.tag }}

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        uses: ./.github/actions/setup-bicep
        with:
          version: ${{ vars.BICEP_VERSION }}

      - name: Publish module to ACR
        run: |
          bicep publish \
            "modules/${{ steps.parse-tag.outputs.module_path }}/main.json" \
            --target "br:${{ vars.PUBLISH_REGISTRY_SERVER }}/bicep/${{ steps.parse-tag.outputs.module_path }}:${{ steps.parse-tag.outputs.version }}" \
            --documentation-uri "${{ steps.parse-tag.outputs.documentation_uri }}" \
            --force